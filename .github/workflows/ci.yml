name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 ninja-build cmake

      - name: Build and test
        env:
          CXX: g++-14
          CC: gcc-14
        run: bash ./test.sh
